services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schulkompetenzen-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - vendor_data:/var/www/html/vendor
      - ./var/cache/:/var/www/html/var/cache:rw
      - ./var/log:/var/www/html/var/log:rw
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: schulkompetenzen-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: schulkompetenzen
      POSTGRES_PASSWORD: schulkompetenzen_dev
      POSTGRES_DB: schulkompetenzen
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schulkompetenzen"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ldap:
    image: osixia/openldap:1.5.0
    container_name: schulkompetenzen-ldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "Linuxmuster"
      LDAP_DOMAIN: "linuxmuster.lan"
      LDAP_BASE_DN: "DC=linuxmuster,DC=lan"
      LDAP_ADMIN_PASSWORD: "admin_dev_password"
      LDAP_CONFIG_PASSWORD: "config_dev_password"
      LDAP_READONLY_USER: true
      LDAP_READONLY_USER_USERNAME: "binduser"
      LDAP_READONLY_USER_PASSWORD_ENCRYPTED: "bind_dev_password"
      LDAP_TLS: "false"
      LDAP_TLS_VERIFY_CLIENT: "never"
      LDAP_SEED_INTERNAL_LDIF_PATH: /ldif-seed
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./docker/ldap/bootstrap.ldif:/ldif-seed/bootstrap.ldif:ro
    networks:
      - app-network

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: schulkompetenzen-phpldapadmin
    ports:
      - "8081:443"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "true"
    depends_on:
      - ldap
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: schulkompetenzen-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@schulkompetenzen.dev
      PGADMIN_DEFAULT_PASSWORD: pgadmin_dev
    depends_on:
      - db
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: schulkompetenzen-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      TZ: Europe/Berlin
    networks:
      - app-network
      
volumes:
  postgres_data:
  ldap_data:
  ldap_config:
  ldap_bootstrap:
  vendor_data:

networks:
  app-network:
    driver: bridge
